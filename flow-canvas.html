<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NewScience — Agent Workflow Canvas</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Red+Hat+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  /* Synced with brand.md / token.css — Inter + Red Hat Mono, white surfaces,
     hairline borders, one ink inversion, cobalt accent. No serif, no italic. */
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --ink:#0d1a30;--ink-soft:#2a4068;--ink-muted:#5a6b86;
    --paper:#ffffff;--surface:#ffffff;--surface-inv:#0d1a30;
    --cobalt:#1c4196;--cobalt-light:#6f9be8;--line:rgba(13,26,48,0.14);
    --green:#1c7a52;--amber:#9a6b15;--red:#a23a2e;
    --display:'Inter',system-ui,sans-serif;--sans:'Inter',system-ui,sans-serif;--mono:'Red Hat Mono',ui-monospace,monospace;
    --grid:rgba(13,26,48,0.06);--canvas-bg:#f6f7f9;--fill-faint:rgba(13,26,48,0.05);
  }
  body{background:var(--paper);color:var(--ink);font-family:var(--sans);font-weight:300;padding:64px 40px;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1200px;margin:0 auto}
  .flow-head{text-align:center;margin-bottom:36px}
  .label{font-family:var(--mono);font-size:11px;letter-spacing:0.28em;text-transform:uppercase;color:var(--ink-muted);display:block;margin-bottom:16px}
  h1{font-family:var(--display);font-weight:500;font-size:clamp(30px,3.6vw,46px);line-height:1.05;letter-spacing:-0.025em;margin-bottom:14px}
  .sub{color:var(--ink-soft);font-weight:300;font-size:16px;line-height:1.7;max-width:60ch;margin:0 auto}

  /* toolbar */
  .toolbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
  .btn{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;border:1px solid var(--line);background:#fff;color:var(--ink);padding:10px 16px;border-radius:2px;cursor:pointer;display:inline-flex;align-items:center;gap:8px;transition:background .2s,opacity .2s,border-color .2s}
  .btn:hover{background:var(--fill-faint)}
  .btn:focus-visible{outline:2px solid var(--cobalt);outline-offset:2px}
  .btn.primary{background:var(--surface-inv);color:#fff;border-color:var(--surface-inv)}
  .btn.primary:hover{opacity:.86;background:var(--surface-inv)}
  .btn .bi{display:inline-flex}.btn .bi svg{width:14px;height:14px}
  .tb-status{font-family:var(--mono);font-size:11px;letter-spacing:.04em;color:var(--ink-muted);margin-left:auto;display:inline-flex;align-items:center;gap:8px}
  .tb-status .live{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 1.4s ease-in-out infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

  /* canvas */
  .canvas{
    position:relative;width:100%;height:680px;border:1px solid var(--line);border-radius:4px;overflow:hidden;
    background-color:var(--canvas-bg);
    background-image:radial-gradient(var(--grid) 1.3px, transparent 1.3px);
    background-size:22px 22px;
  }
  svg.wires{position:absolute;inset:0;width:100%;height:100%;z-index:1;pointer-events:none}

  .node{
    position:absolute;z-index:2;width:188px;background:var(--surface);border:1px solid var(--line);border-radius:8px;
    box-shadow:0 2px 4px rgba(13,26,48,.04),0 16px 32px -24px rgba(13,26,48,.4);
    cursor:pointer;transition:transform .15s,box-shadow .15s,border-color .15s;
  }
  .node:hover{transform:translateY(-2px);box-shadow:0 4px 8px rgba(13,26,48,.06),0 22px 40px -24px rgba(13,26,48,.5);border-color:var(--ink-muted)}
  .node.sel{border-color:var(--cobalt);box-shadow:0 0 0 3px rgba(28,65,150,.12),0 22px 40px -24px rgba(13,26,48,.5)}
  .node.active{border-color:var(--ink)}
  .node .head{display:flex;align-items:center;gap:10px;padding:12px 13px}
  .node .ic{width:34px;height:34px;border-radius:6px;background:var(--fill-faint);display:flex;align-items:center;justify-content:center;color:var(--ink);flex-shrink:0;transition:background .3s,color .3s}
  .node .ic svg{width:18px;height:18px}
  .node.active .ic{background:var(--ink);color:#fff}
  .node .tt{min-width:0}
  .node .nm{font-family:var(--sans);font-weight:500;font-size:13.5px;line-height:1.2;letter-spacing:-.01em}
  .node .ac{font-family:var(--mono);font-size:8.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-muted);margin-top:3px}
  .node .foot{border-top:1px solid var(--line);padding:7px 13px;display:flex;align-items:center;justify-content:space-between}
  .chip{font-family:var(--mono);font-size:8.5px;letter-spacing:.08em;text-transform:uppercase;padding:3px 7px;border-radius:3px}
  .chip.idle{color:var(--ink-muted);background:var(--fill-faint)}
  .chip.done{color:var(--green);background:rgba(28,122,82,.1)}
  .chip.run{color:var(--amber);background:rgba(154,107,21,.12)}
  .node .type{font-family:var(--mono);font-size:8.5px;letter-spacing:.06em;color:var(--ink-muted)}

  /* ports */
  .port{position:absolute;width:11px;height:11px;border-radius:50%;background:#fff;border:1.5px solid var(--ink-muted);top:50%;transform:translateY(-50%);z-index:3}
  .port.in{left:-6px}.port.out{right:-6px}
  .node.lead .port{border-color:var(--cobalt)}

  /* lead node emphasis — the one inverted surface */
  .node.lead{width:208px;border-color:var(--ink);background:var(--surface-inv)}
  .node.lead .nm{color:#fff}.node.lead .ac{color:rgba(255,255,255,.55)}
  .node.lead .ic{background:rgba(255,255,255,.12);color:#fff}
  .node.lead .foot{border-top-color:rgba(255,255,255,.14)}
  .node.lead .type{color:rgba(255,255,255,.5)}
  .node.lead .chip.run{background:rgba(154,107,21,.25);color:#e3c06a}

  /* gate node */
  .node.gate{border-color:var(--cobalt)}
  .node.gate .ic{background:rgba(28,65,150,.1);color:var(--cobalt)}

  /* detail drawer */
  .drawer{margin-top:18px;background:var(--surface);border:1px solid var(--line);border-radius:4px;padding:24px 26px;display:grid;grid-template-columns:1fr 320px;gap:32px}
  .drawer h3{font-family:var(--display);font-weight:500;font-size:24px;letter-spacing:-0.02em;margin-bottom:6px}
  .drawer .dt{font-family:var(--display);font-weight:400;font-size:15px;color:var(--ink-muted);margin-bottom:14px}
  .drawer p{color:var(--ink-soft);font-size:14.5px;line-height:1.7;font-weight:300}
  .io{font-family:var(--mono);font-size:12px}
  .io .r{padding:9px 0;border-bottom:1px solid var(--line)}
  .io .r:last-child{border:none}
  .io .k{font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-muted);display:block;margin-bottom:3px}
  .io .v{color:var(--ink)}
  @media(max-width:820px){.drawer{grid-template-columns:1fr;gap:18px}.canvas{height:560px}}
  @media(max-width:760px){body{padding:48px 24px}}
  @media(prefers-reduced-motion:reduce){.dashflow{animation:none!important}.live{animation:none}}
</style>
</head>
<body>
<div class="wrap">
  <div class="toolbar">
    <span class="tb-status"><span class="live"></span> <span id="statusText">idle — 6 agents, 1 orchestrator</span></span>
  </div>

  <div class="canvas" id="canvas">
    <svg class="wires" id="wires" viewBox="0 0 1180 680" preserveAspectRatio="none"></svg>
    <!-- nodes injected by JS -->
  </div>

  <div class="drawer">
    <div>
      <h3 id="d-name">Lead Agent</h3>
      <div class="dt" id="d-tag">Orchestrates the swarm.</div>
      <p id="d-desc"></p>
    </div>
    <div class="io">
      <div class="r"><span class="k">Input</span><span class="v" id="d-in"></span></div>
      <div class="r"><span class="k">Output</span><span class="v" id="d-out"></span></div>
      <div class="r"><span class="k">Key skills</span><span class="v" id="d-sk"></span></div>
    </div>
  </div>
</div>

<script>
// ---- inline SVG icons (no external dependency) ----
const ICONS = {
  "hierarchy":'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3 4 7l8 4 8-4-8-4M4 17l8 4 8-4M4 12l8 4 8-4"/></svg>',
  "filter":'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16l-6 8v6l-4 2v-8z"/></svg>',
  "chart":'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19V5M4 19h16M8 16l3-4 3 2 4-6"/></svg>',
  "cpu":'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="7" y="7" width="10" height="10" rx="1"/><path d="M9 2v3M15 2v3M9 19v3M15 19v3M2 9h3M2 15h3M19 9h3M19 15h3"/></svg>',
  "atom":'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="1.6"/><ellipse cx="12" cy="12" rx="9" ry="3.5"/><ellipse cx="12" cy="12" rx="9" ry="3.5" transform="rotate(60 12 12)"/><ellipse cx="12" cy="12" rx="9" ry="3.5" transform="rotate(120 12 12)"/></svg>',
  "shield":'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l8 3v6c0 5-3.5 8-8 9-4.5-1-8-4-8-9V6z"/><path d="M9 12l2 2 4-4"/></svg>',
  "wallet":'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="6" width="18" height="13" rx="2"/><path d="M3 10h18M16 14h2"/></svg>',
  "usercheck":'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3.2"/><path d="M3 20c0-3.3 2.7-6 6-6 1.2 0 2.3.35 3.2.96M16 18l2 2 4-4"/></svg>',
  "play":'<svg viewBox="0 0 24 24" fill="currentColor"><path d="M7 5l12 7-12 7z"/></svg>',
  "refresh":'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 11a8 8 0 1 0-2 5.3M20 5v6h-6"/></svg>',
};
const NODES = {
  lead:  {x:486, y:300, cls:"lead", icon:"hierarchy", name:"Lead Agent", actor:"Orchestrator", type:"orchestrator",
          tag:"Orchestrates the swarm.", desc:"Routes tasks to specialist sub-agents, manages the budget, signs results, and decides what to run next based on gaps in the knowledge graph.",
          in:"Research topic", out:"Routed tasks + budget", sk:"Task routing · DID signing · budget guardrails"},
  curate:{x:120, y:90, cls:"", icon:"filter", name:"Curation", actor:"Sub-agent", type:"ingest",
          tag:"Filters noise before the graph.", desc:"Crawls trusted Tier 1–3 sources, trust-scores each paper, and dedups against the graph. Low-quality preprints never enter.",
          in:"Research topic", out:"Clean, trust-scored papers", sk:"Web/API harvest · trust-scoring"},
  analyst:{x:120, y:300, cls:"", icon:"chart", name:"Analyst", actor:"Sub-agent", type:"analysis",
          tag:"Maps the state of the art.", desc:"Extracts SOTA metrics via GraphRAG, builds a comparison dashboard, and picks the strongest structure to reproduce.",
          in:"Clean papers", out:"SOTA table + dashboard", sk:"Param extraction · GraphRAG"},
  evaluator:{x:120, y:510, cls:"", icon:"cpu", name:"Evaluator", actor:"Sub-agent", type:"simulation",
          tag:"Re-runs, scores the gap.", desc:"Translates parameters into simulation commands, runs folding & docking on distributed compute, and scores against reported metrics.",
          in:"Config parameters", out:"Reproducibility score", sk:"ColabFold · DiffDock · log comparison"},
  insight:{x:852, y:90, cls:"", icon:"atom", name:"Insight Generator", actor:"Sub-agent", type:"design",
          tag:"Designs the next experiment.", desc:"Reads the verified gap, identifies sub-optimal sites, and designs structural variants to test next.",
          in:"Delta (theory vs sim)", out:"Mutation variants", sk:"Mutation design · ranking"},
  critic:{x:852, y:300, cls:"", icon:"shield", name:"Critic Agent", actor:"Sub-agent", type:"gate",
          tag:"Independent quality gate.", desc:"Cross-evaluates sub-agent output before anything is committed. Below threshold, it sends the task back with feedback.",
          in:"Sub-agent outputs", out:"Approve / reject / retry", sk:"Cross-evaluation · threshold gating"},
  x402:{x:852, y:510, cls:"", icon:"wallet", name:"x402 Skill", actor:"Callable", type:"economy",
          tag:"Funds its own compute.", desc:"Pays the compute node per job within budget caps. Above a threshold it pauses for human approval. Every transaction is signed.",
          in:"Approved job", out:"Funded run", sk:"x402 · budget caps"},
  gate:{x:486, y:560, cls:"gate", icon:"usercheck", name:"Human Gate", actor:"Researcher", type:"approval",
          tag:"Approves once, at the end.", desc:"Reviews the pull request — results, provenance, signed audit trail — then approves or rejects with feedback. The only required human step.",
          in:"Auto pull request", out:"Published, signed finding", sk:"Review · approve / reject"},
};
const NW=188, NWL=208, NH=78; // node width / lead width / height (approx)
function w(id){return id==="lead"?NWL:NW;}
// ports: out = right-center, in = left-center
function outPt(id){const n=NODES[id];return {x:n.x+w(id), y:n.y+NH/2};}
function inPt(id){const n=NODES[id];return {x:n.x, y:n.y+NH/2};}
function leftPt(id){const n=NODES[id];return {x:n.x, y:n.y+NH/2};}
function rightPt(id){const n=NODES[id];return {x:n.x+w(id), y:n.y+NH/2};}

// edges: [from, fromSide, to, toSide]
const EDGES = [
  ["curate","r","lead","l"],
  ["analyst","r","lead","l"],
  ["evaluator","r","lead","l"],
  ["lead","r","insight","l"],
  ["lead","r","critic","l"],
  ["lead","r","x402","l"],
  ["lead","b","gate","t"],   // special vertical down to gate
];

const canvas=document.getElementById('canvas');
const svg=document.getElementById('wires');

// render nodes
function renderNodes(){
  for(const id in NODES){
    const n=NODES[id];
    const el=document.createElement('div');
    el.className="node "+n.cls; el.id="node-"+id; el.style.left=n.x+"px"; el.style.top=n.y+"px";
    el.innerHTML=`
      <span class="port in"></span><span class="port out"></span>
      <div class="head">
        <div class="ic">${ICONS[n.icon]}</div>
        <div class="tt"><div class="nm">${n.name}</div><div class="ac">${n.actor}</div></div>
      </div>
      <div class="foot"><span class="type">${n.type}</span><span class="chip idle" id="chip-${id}">idle</span></div>`;
    el.onclick=()=>select(id);
    canvas.appendChild(el);
  }
}
// the canvas is 1180 wide in svg coords but scales; nodes use px on same coordinate space.
// To keep wires aligned with px nodes, set svg viewBox to canvas pixel size dynamically.
function sizeSvg(){
  const r=canvas.getBoundingClientRect();
  svg.setAttribute('viewBox',`0 0 ${r.width} ${r.height}`);
  // reposition nodes proportionally from design 1180x680 to actual size
  const sx=r.width/1180, sy=r.height/680;
  for(const id in NODES){
    const n=NODES[id];const el=document.getElementById('node-'+id);
    el.style.left=(n.x*sx)+'px'; el.style.top=(n.y*sy)+'px';
  }
  drawWires(sx,sy);
}
function bezier(p0,p1){
  const dx=Math.max(40,Math.abs(p1.x-p0.x)*0.5);
  return `M ${p0.x},${p0.y} C ${p0.x+dx},${p0.y} ${p1.x-dx},${p1.y} ${p1.x},${p1.y}`;
}
function vbezier(p0,p1){ // vertical-ish
  const dy=Math.max(40,Math.abs(p1.y-p0.y)*0.5);
  return `M ${p0.x},${p0.y} C ${p0.x},${p0.y+dy} ${p1.x},${p1.y-dy} ${p1.x},${p1.y}`;
}
function drawWires(sx,sy){
  svg.innerHTML="";
  EDGES.forEach((e,i)=>{
    const [from,fs,to,ts]=e;
    let p0,p1,d;
    if(fs==="b"){ // lead bottom -> gate top
      const nf=NODES[from], nt=NODES[to];
      p0={x:(nf.x+w(from)/2)*sx, y:(nf.y+NH)*sy};
      p1={x:(nt.x+w(to)/2)*sx, y:(nt.y)*sy};
      d=vbezier(p0,p1);
    } else {
      p0 = fs==="r"? {x:rightPt(from).x*sx,y:rightPt(from).y*sy} : {x:leftPt(from).x*sx,y:leftPt(from).y*sy};
      p1 = ts==="l"? {x:leftPt(to).x*sx,y:leftPt(to).y*sy} : {x:rightPt(to).x*sx,y:rightPt(to).y*sy};
      d=bezier(p0,p1);
    }
    const base=document.createElementNS('http://www.w3.org/2000/svg','path');
    base.setAttribute('d',d);base.setAttribute('fill','none');
    base.setAttribute('stroke','rgba(13,26,48,0.22)');base.setAttribute('stroke-width','1.6');
    svg.appendChild(base);
    // animated flow overlay (hidden until run)
    const flow=document.createElementNS('http://www.w3.org/2000/svg','path');
    flow.setAttribute('d',d);flow.setAttribute('fill','none');
    flow.setAttribute('stroke','#1c4196');flow.setAttribute('stroke-width','2.4');
    flow.setAttribute('stroke-linecap','round');
    flow.setAttribute('class','flow');flow.setAttribute('id','flow-'+i);
    const len=flow.getTotalLength?0:0; // set after attach
    flow.style.opacity='0';
    svg.appendChild(flow);
  });
  // loop-back wire: insight -> curate (evidence compounds)
  const nf=NODES["insight"], nt=NODES["curate"];
  const p0={x:(nf.x+w("insight"))*sx, y:(nf.y+NH/2)*sy};
  const p1={x:(nt.x+w("curate"))*sx, y:(nt.y+NH/2-10)*sy};
  const d=`M ${p0.x},${p0.y} C ${p0.x+120*sx},${p0.y-90*sy} ${p1.x+120*sx},${p1.y-120*sy} ${p1.x},${p1.y}`;
  const lb=document.createElementNS('http://www.w3.org/2000/svg','path');
  lb.setAttribute('d',d);lb.setAttribute('fill','none');lb.setAttribute('stroke','#1c4196');
  lb.setAttribute('stroke-width','1.4');lb.setAttribute('stroke-dasharray','5 5');lb.setAttribute('opacity','0.55');
  svg.appendChild(lb);
  const tx=document.createElementNS('http://www.w3.org/2000/svg','text');
  tx.setAttribute('x',(p0.x+ (p1.x-p0.x)/2)); tx.setAttribute('y',(Math.min(p0.y,p1.y)-70*sy));
  tx.setAttribute('text-anchor','middle');tx.setAttribute('fill','#1c4196');
  tx.setAttribute('font-family','Red Hat Mono, monospace');tx.setAttribute('font-size','10');tx.setAttribute('letter-spacing','1.5');
  tx.textContent='EVIDENCE COMPOUNDS';
  svg.appendChild(tx);
}

// selection / detail
function select(id){
  document.querySelectorAll('.node').forEach(n=>n.classList.remove('sel'));
  document.getElementById('node-'+id).classList.add('sel');
  const n=NODES[id];
  d_name.textContent=n.name; d_tag.textContent=n.tag; d_desc.textContent=n.desc;
  d_in.textContent=n.in; d_out.textContent=n.out; d_sk.textContent=n.sk;
}
const d_name=document.getElementById('d-name'),d_tag=document.getElementById('d-tag'),d_desc=document.getElementById('d-desc'),
      d_in=document.getElementById('d-in'),d_out=document.getElementById('d-out'),d_sk=document.getElementById('d-sk');

// run animation: light nodes + animate flow paths in execution order
const ORDER=["curate","analyst","evaluator","lead","insight","critic","x402","gate"];
let playing=false, gen=0;
function setChip(id,state,txt){const c=document.getElementById('chip-'+id);c.className="chip "+state;c.textContent=txt;}
function animateFlow(idx){
  const f=document.getElementById('flow-'+idx); if(!f)return;
  const len=f.getTotalLength();
  f.style.opacity='1';
  f.style.strokeDasharray=len; f.style.strokeDashoffset=len;
  f.style.transition='none'; void f.getBoundingClientRect();
  f.style.transition='stroke-dashoffset .7s ease';
  f.style.strokeDashoffset='0';
  setTimeout(()=>{f.style.transition='opacity .6s';f.style.opacity='0.25';},800);
}
const wait=ms=>new Promise(r=>setTimeout(r,ms));
async function runOnce(g){
  reset(true);
  document.getElementById('statusText').textContent='executing…';
  for(let i=0;i<ORDER.length;i++){
    if(g!==gen) return;
    const id=ORDER[i];
    const el=document.getElementById('node-'+id);
    el.classList.add('active'); setChip(id,'run','running');
    // animate the wire(s) leaving the previous toward this — light all flow paths roughly in order
    if(i<7) animateFlow(Math.min(i, 6));
    await wait(620);
    if(g!==gen) return;
    setChip(id,'done', id==='gate'?'signed':'done');
  }
  document.getElementById('statusText').textContent='complete — finding signed & published';
}
async function loop(g){
  while(g===gen && playing){
    await runOnce(g);
    if(g!==gen || !playing) break;
    await wait(1500);
  }
}
function reset(soft){
  document.querySelectorAll('.node').forEach(n=>n.classList.remove('active'));
  for(const id in NODES) setChip(id,'idle','idle');
  document.querySelectorAll('.flow').forEach(f=>f.style.opacity='0');
  if(!soft) document.getElementById('statusText').textContent='idle — 6 agents, 1 orchestrator';
}

// play only while the box is open; loop forever; pause cleanly when closed
window.nsPlay=function(){ if(playing) return; playing=true; gen++; loop(gen); };
window.nsPause=function(){ playing=false; gen++; reset(false); };

// init
renderNodes();
sizeSvg();
select('lead');
window.addEventListener('resize',sizeSvg);
</script>
</body>
</html>
