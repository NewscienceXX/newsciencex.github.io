<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NewScience — Autonomous Economy</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Red+Hat+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  /* Synced with brand.md / token.css — Inter + Red Hat Mono, white surfaces,
     hairline borders, cobalt accent, brand status colors. No serif, no italic. */
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --ink:#0d1a30;--ink-soft:#2a4068;--ink-muted:#5a6b86;
    --paper:#ffffff;--surface:#ffffff;--canvas-bg:#f6f7f9;--line:rgba(13,26,48,0.14);--fill-faint:rgba(13,26,48,0.05);
    --cobalt:#1c4196;--cobalt-light:#6f9be8;--green:#1c7a52;--amber:#9a6b15;--red:#a23a2e;
    --display:'Inter',system-ui,sans-serif;--sans:'Inter',system-ui,sans-serif;--mono:'Red Hat Mono',ui-monospace,monospace;
  }
  body{background:var(--paper);color:var(--ink);font-family:var(--sans);font-weight:300;-webkit-font-smoothing:antialiased;padding:56px 40px}

  .frame{width:100%;max-width:1180px;margin:0 auto;aspect-ratio:16/9;position:relative;border:1px solid var(--line);border-radius:6px;overflow:hidden;background:var(--canvas-bg);display:flex;flex-direction:column}

  .topbar{display:flex;align-items:center;gap:12px;padding:13px 18px;border-bottom:1px solid var(--line);background:var(--surface);z-index:6}
  .brand{display:flex;align-items:center;gap:9px}
  .brand .mk{width:26px;height:26px;border-radius:5px;background:var(--ink);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10px;color:#fff}
  .brand .nm{font-family:var(--display);font-weight:600;font-size:16px;letter-spacing:-0.01em}
  .brand .tag{font-family:var(--mono);font-size:8px;letter-spacing:.12em;text-transform:uppercase;color:var(--cobalt);border:1px solid rgba(28,65,150,.35);border-radius:20px;padding:3px 7px}
  .topic{margin-left:6px;display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:10px;color:var(--ink-muted)}
  .topic .v{color:var(--ink)}
  .meta{margin-left:auto;display:flex;gap:16px;font-family:var(--mono);font-size:9px;letter-spacing:.05em;color:var(--ink-muted);text-transform:uppercase}
  .meta b{color:var(--ink)}
  @media(max-width:700px){.meta{display:none}}

  .stage{flex:1;position:relative;min-height:0}
  canvas{position:absolute;inset:0;width:100%;height:100%;z-index:1}

  .colhead{position:absolute;top:10px;z-index:4;font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-muted);transform:translateX(-50%);text-align:center;width:200px}

  .controls{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);z-index:6}
  .btn{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;border:1px solid var(--ink);background:var(--ink);color:#fff;padding:12px 24px;border-radius:2px;cursor:pointer;display:inline-flex;align-items:center;gap:8px;transition:opacity .2s}
  .btn:hover{opacity:.88} .btn:disabled{opacity:.4;cursor:default} .btn svg{width:12px;height:12px}

  .legend{position:absolute;left:14px;bottom:14px;z-index:5;font-family:var(--mono);font-size:9px;color:var(--ink-muted);display:flex;gap:14px;flex-wrap:wrap;max-width:60%}
  .legend .row{display:flex;align-items:center;gap:6px}
  .legend .sw{width:9px;height:9px;border-radius:2px}
  .foot{position:absolute;right:14px;bottom:14px;font-family:var(--mono);font-size:8px;color:var(--ink-muted);z-index:5}

  /* budget meter bottom-right inside stage (clear of the column headers) */
  .budget{position:absolute;right:16px;bottom:44px;z-index:5;width:190px;font-family:var(--mono)}
  .budget .bl{font-size:8px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-muted);margin-bottom:6px;display:flex;justify-content:space-between}
  .budget .bar{height:8px;background:var(--fill-faint);border-radius:4px;overflow:hidden}
  .budget .fill{height:100%;width:100%;background:linear-gradient(90deg,#1c4196,#6f9be8);transition:width .5s ease}
  .budget .amt{font-size:13px;color:var(--ink);margin-top:6px;text-align:right}

  @media(max-width:700px){.frame{aspect-ratio:auto;height:520px}}
</style>
</head>
<body>
<div class="frame" id="frame">
  <div class="topbar">
    <div class="brand"><span class="tag">Autonomous Economy</span></div>
    <div class="topic">topic <span class="v">“Kinase inhibitor screen”</span></div>
    <div class="meta">
      <span><b id="m-calls">0</b> API calls</span>
      <span><b id="m-paid">$0.00</b> paid</span>
      <span><b id="m-jobs">0</b> jobs run</span>
    </div>
  </div>

  <div class="stage" id="stage">
    <canvas id="cv"></canvas>
    <div class="budget">
      <div class="bl"><span>Pooled budget</span><span id="modeLbl">full</span></div>
      <div class="bar"><div class="fill" id="bfill"></div></div>
      <div class="amt" id="bamt">$20.00</div>
    </div>

    <div class="legend">
      <div class="row"><span class="sw" style="background:#1c4196"></span>Light compute · low fee</div>
      <div class="row"><span class="sw" style="background:#9a6b15"></span>Medium</div>
      <div class="row"><span class="sw" style="background:#a23a2e"></span>Heavy compute · high fee</div>
    </div>
    <div class="foot">// Illustrative sample data · x402 micropayments</div>
  </div>
</div>

<script>
const stage=document.getElementById('stage'), cv=document.getElementById('cv'), ctx=cv.getContext('2d');
let W,H,DPR,_pw=-1,_ph=-1;
function resize(){const r=stage.getBoundingClientRect(); if(Math.abs(r.width-_pw)<1 && Math.abs(r.height-_ph)<1) return; _pw=r.width;_ph=r.height; W=r.width;H=r.height;DPR=Math.min(devicePixelRatio||1,2);cv.width=W*DPR;cv.height=H*DPR;cv.style.width=W+'px';cv.style.height=H+'px';ctx.setTransform(DPR,0,0,DPR,0,0);layout();}
window.addEventListener('resize',resize);

// 4 horizontal lanes (columns): Client agents → API/x402 → Compute (priced by weight) → Result
let LANE=[];
function laneX(i){return LANE[i];}
// agents on the left
const NCLIENT=5;
const CLIENTS=["Agent · Lab A","Agent · Lab B","Agent · Pharma","Agent · Academic","Agent · Startup"];
// compute job archetypes with weights -> fee
const JOBS=[
  {name:"fold predict",     weight:1, tier:"light",  fee:0.12, dur:1800},
  {name:"single docking",   weight:2, tier:"light",  fee:0.22, dur:2200},
  {name:"docking ×8",       weight:4, tier:"medium", fee:0.46, dur:3000},
  {name:"MD refinement",    weight:6, tier:"medium", fee:0.68, dur:3600},
  {name:"ensemble dock ×32",weight:9, tier:"heavy",  fee:1.05, dur:4400},
  {name:"free-energy calc", weight:12,tier:"heavy",  fee:1.60, dur:5200},
];
function tierCol(t){return t==="light"?"#1c4196":t==="medium"?"#9a6b15":"#a23a2e";}

let clients=[], gateY, computeY, packets=[], coins=[];
function layout(){
  LANE=[ W*0.12, W*0.40, W*0.66, W*0.90 ];
  // place colheads
  setHead(0,"Client agents"); setHead(1,"API · x402 call"); setHead(2,"Compute · priced by weight"); setHead(3,"Result");
  clients=[];
  const top=60, bottom=H-56;
  for(let i=0;i<NCLIENT;i++){
    const y=top+(bottom-top)*(i/(NCLIENT-1));
    clients.push({i,y,x:laneX(0),busy:false,label:CLIENTS[i]});
  }
}
function setHead(i,txt){
  let el=document.getElementById('h'+i);
  if(!el){el=document.createElement('div');el.className='colhead';el.id='h'+i;stage.appendChild(el);}
  el.style.left=( [W*0.12,W*0.40,W*0.66,W*0.90][i] )+'px'; el.textContent=txt;
}

// active jobs in flight
let jobsActive=[]; // {client, job, stage:'tocall'|'paying'|'computing'|'done', x,y, prog, ...}
let budget=20.00, paid=0, calls=0, jobsDone=0;

function rnd(a,b){return a+Math.random()*(b-a);}
function shade(hex,amt){const c=hex.replace('#','');const r=parseInt(c.substr(0,2),16),g=parseInt(c.substr(2,2),16),b=parseInt(c.substr(4,2),16);const f=v=>Math.max(0,Math.min(255,Math.round(v+(amt<0?v*amt:(255-v)*amt))));return`rgb(${f(r)},${f(g)},${f(b)})`;}

let phase="idle";window.phase="idle";
let playing=false, gen=0, runTimer=null, doneIv=null, restartTimer=null, dispatched=0;
let t0=performance.now();
function loop(){
  if(!playing) return;
  const now=performance.now(),dt=Math.min(40,now-t0);t0=now;
  // advance jobs
  for(const j of jobsActive){
    if(j.stage==="tocall"){ j.t+=dt/700; if(j.t>=1){ j.t=0; j.stage="paying"; doPay(j);} }
    else if(j.stage==="paying"){ j.t+=dt/700; if(j.t>=1){ j.t=0; j.stage="computing"; } }
    else if(j.stage==="computing"){ j.prog+=dt/j.job.dur; if(j.prog>=1){ j.prog=1; j.stage="result"; j.t=0; finishJob(j);} }
    else if(j.stage==="result"){ j.t+=dt/700; }
  }
  jobsActive=jobsActive.filter(j=>!(j.stage==="result"&&j.t>=1.1));
  for(const c of coins){ c.t+=dt/650; } coins=coins.filter(c=>c.t<1.05);
  draw(); requestAnimationFrame(loop);
}

function draw(){
  ctx.clearRect(0,0,W,H);
  // lane guide lines (faint vertical anchors)
  // edges client->gate (static faint), gate->compute, compute->result
  ctx.strokeStyle="rgba(28,65,150,0.10)";ctx.lineWidth=1;
  for(const c of clients){ curve(c.x+22, c.y, laneX(1), H/2); }
  curveV(laneX(1),H/2,laneX(2),H/2,"rgba(28,65,150,0.10)",1);
  curveV(laneX(2),H/2,laneX(3),H/2,"rgba(28,122,82,0.12)",1);

  // x402 gate node (center-left)
  drawHub(laneX(1),H/2,"x402","API");
  // compute hub
  drawHub(laneX(2),H/2,"⚙","RUN");
  // result hub
  drawHub(laneX(3),H/2,"✓","SIGNED",true);

  // client nodes
  for(const c of clients){
    const r=15;
    const g=ctx.createRadialGradient(c.x-4,c.y-4,1,c.x,c.y,r);
    g.addColorStop(0,"#6f9be8");g.addColorStop(1,"#1c4196");
    ctx.beginPath();ctx.arc(c.x,c.y,r,0,7);ctx.fillStyle=g;ctx.fill();
    ctx.strokeStyle="rgba(28,65,150,0.45)";ctx.lineWidth=1;ctx.stroke();
    ctx.fillStyle="#ffffff";ctx.font="10px 'Red Hat Mono',monospace";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText("◆",c.x,c.y);
    ctx.fillStyle="rgba(13,26,48,0.6)";ctx.font="7px 'Red Hat Mono',monospace";ctx.fillText(c.label,c.x,c.y+r+10);
  }

  // active job tokens
  const computing=jobsActive.filter(j=>j.stage==="computing");
  computing.forEach((j,idx)=>{ j._row=idx; j._n=computing.length; });
  for(const j of jobsActive){
    let pos;
    if(j.stage==="tocall"){ pos=cpos(j.cx,j.cy,laneX(1),H/2,j.t); }
    else if(j.stage==="paying"){ pos={x:laneX(1),y:H/2}; }
    else if(j.stage==="computing"){ pos={x:laneX(2),y:H/2}; }
    else { pos=cpos(laneX(2),H/2,laneX(3),H/2,j.t); }
    const r=6+j.job.weight*0.9;
    const col=tierCol(j.job.tier);
    if(j.stage==="computing"){
      const spacing=Math.min(42, (H-120)/Math.max(1,j._n));
      const oy=H/2 + (j._row-(j._n-1)/2)*spacing;
      ctx.beginPath();ctx.arc(laneX(2),oy,r+5,-Math.PI/2,-Math.PI/2+j.prog*Math.PI*2);ctx.strokeStyle=col;ctx.lineWidth=2.5;ctx.lineCap="round";ctx.stroke();
      ballGrad(laneX(2),oy,r,col);
      ctx.fillStyle="#ffffff";ctx.font="8px 'Red Hat Mono',monospace";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(Math.round(j.prog*100)+"%",laneX(2),oy);
      // fee tag (left) + name (right) to avoid vertical collision
      ctx.fillStyle=col;ctx.font="9px 'Red Hat Mono',monospace";ctx.textAlign="right";ctx.fillText("$"+j.job.fee.toFixed(2),laneX(2)-r-8,oy);
      ctx.fillStyle="rgba(13,26,48,0.7)";ctx.font="8px 'Red Hat Mono',monospace";ctx.textAlign="left";ctx.fillText(j.job.name,laneX(2)+r+8,oy);
    } else {
      ballGrad(pos.x,pos.y,r,col);
      if(j.stage==="result"){ctx.fillStyle="#ffffff";ctx.font="9px 'Red Hat Mono',monospace";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText("✓",pos.x,pos.y);}
    }
  }

  // x402 coins flying client->gate when paying
  for(const c of coins){
    const pos=cpos(c.x0,c.y0,c.x1,c.y1,c.t);
    ctx.beginPath();ctx.arc(pos.x,pos.y,7,0,7);ctx.fillStyle="#9a6b15";ctx.fill();
    ctx.fillStyle="#ffffff";ctx.font="9px 'Red Hat Mono',monospace";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText("$",pos.x,pos.y);
  }
}
function jobsComputing(){return jobsActive.filter(j=>j.stage==="computing").length||1;}
function ballGrad(x,y,r,col){const g=ctx.createRadialGradient(x-r*0.3,y-r*0.3,1,x,y,r);g.addColorStop(0,col);g.addColorStop(1,shade(col,-0.5));ctx.beginPath();ctx.arc(x,y,r,0,7);ctx.fillStyle=g;ctx.fill();}
function drawHub(x,y,glyph,label,green){
  ctx.beginPath();ctx.roundRect(x-30,y-30,60,60,12);
  ctx.fillStyle="#ffffff";ctx.fill();
  ctx.strokeStyle = green? "rgba(28,122,82,0.55)":"rgba(28,65,150,0.45)";ctx.lineWidth=1;ctx.stroke();
  ctx.fillStyle="#0d1a30";ctx.font="600 16px 'Inter',sans-serif";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(glyph,x,y-2);
  ctx.fillStyle=green?"#1c7a52":"#1c4196";ctx.font="7px 'Red Hat Mono',monospace";ctx.fillText(label,x,y+18);
}
function curve(x0,y0,x1,y1){const mx=(x0+x1)/2;ctx.beginPath();ctx.moveTo(x0,y0);ctx.bezierCurveTo(mx,y0,mx,y1,x1,y1);ctx.stroke();}
function curveV(x0,y0,x1,y1,style,w){ctx.strokeStyle=style;ctx.lineWidth=w;const mx=(x0+x1)/2;ctx.beginPath();ctx.moveTo(x0,y0);ctx.bezierCurveTo(mx,y0,mx,y1,x1,y1);ctx.stroke();}
function cpos(x0,y0,x1,y1,t){const mx=(x0+x1)/2,u=1-t;const x=u*u*u*x0+3*u*u*t*mx+3*u*t*t*mx+t*t*t*x1;const y=u*u*u*y0+3*u*u*t*y0+3*u*t*t*y1+t*t*t*y1;return{x,y};}

// ---- economy logic ----
function doPay(j){
  const fee=j.job.fee;
  budget=Math.max(0,budget-fee); paid+=fee;
  paid=Math.round(paid*100)/100;
  document.getElementById('m-paid').textContent="$"+paid.toFixed(2);
  setBudget();
  calls++; document.getElementById('m-calls').textContent=calls;
  // coin animation client->gate
  coins.push({x0:j.cx,y0:j.cy,x1:laneX(1),y1:H/2,t:0});
  // assign a compute slot
  j.slot=jobsActive.filter(a=>a.stage==="computing").length;
}
function finishJob(j){
  jobsDone++; document.getElementById('m-jobs').textContent=jobsDone;
}
function setBudget(){
  const pct=Math.max(0,Math.min(100,budget/20*100));
  const f=document.getElementById('bfill'); f.style.width=pct+'%';
  document.getElementById('bamt').textContent="$"+budget.toFixed(2);
  const m=document.getElementById('modeLbl');
  if(budget>8){m.textContent="full";f.style.background="linear-gradient(90deg,#1c4196,#6f9be8)";}
  else if(budget>3){m.textContent="conserve";f.style.background="linear-gradient(90deg,#7a5512,#9a6b15)";}
  else{m.textContent="low";f.style.background="linear-gradient(90deg,#7a2a22,#a23a2e)";}
}

function dispatch(client){
  // choose a job weighted toward variety
  const job=JOBS[Math.floor(rnd(0,JOBS.length))];
  jobsActive.push({client, job, stage:"tocall", t:0, prog:0, cx:client.x, cy:client.y, slot:0});
}

const TOTAL=14;
function start(){
  layout(); budget=20;paid=0;calls=0;jobsDone=0;jobsActive=[];coins=[];dispatched=0;
  document.getElementById('m-calls').textContent='0';
  document.getElementById('m-paid').textContent='$0.00';
  document.getElementById('m-jobs').textContent='0';
  setBudget();
  phase="running";window.phase="running";
  const g=gen;
  // stagger client dispatches (independent, not synchronized)
  function tickDispatch(){
    if(g!==gen) return;
    if(dispatched>=TOTAL){ checkDone(g); return; }
    const c=clients[Math.floor(rnd(0,clients.length))];
    dispatch(c); dispatched++;
    runTimer=setTimeout(tickDispatch, 750+Math.random()*900);
  }
  tickDispatch();
}
function checkDone(g){
  // wait until all jobs resolved
  doneIv=setInterval(()=>{
    if(g!==gen){ clearInterval(doneIv); return; }
    if(jobsActive.length===0){
      clearInterval(doneIv);
      phase="done";window.phase="done";
      // auto-loop: pause, then run again
      clearTimeout(restartTimer);
      restartTimer=setTimeout(()=>{ if(g===gen && playing) start(); }, 1600);
    }
  },400);
}

// play only while the box is open; loop forever; pause cleanly when closed
window.nsPlay=function(){ if(playing) return; playing=true; gen++; t0=performance.now(); requestAnimationFrame(loop); start(); };
window.nsPause=function(){ playing=false; gen++; clearTimeout(runTimer); clearInterval(doneIv); clearTimeout(restartTimer); phase="idle";window.phase="idle"; };

resize(); setBudget();
</script>
</body>
</html>
